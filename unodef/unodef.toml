# =============================================================================
# STRUCTS.  Field syntax: "name : type @offset [le|be]"  (default endian = le).
# Offsets are byte-exact and ARE the contract.
# =============================================================================

# Window-table entry — UnoDOS 3.1 CLEAN LAYOUT (Phase 12, x86 pilot). The legacy
# 32B entry (inline char[12] title, owner@11, flags@1, zorder@10, content_scale@24)
# is replaced by the compact 16B greenfield layout: owner joins the hot prefix at
# @1, the title becomes a near POINTER (@10) into a kernel title pool instead of a
# 12-byte inline buffer (the change that halves the entry), and z-order stays as an
# in-entry rank byte (a valid per-platform realization of the z-order RELATION).
# kernel.asm consumes WIN_OFF_* symbolically, so this is a regenerate-only change.
[[struct]]
name = "win_entry"
size = 16
count = 16                # fixed table of 16 windows (window_table)
fields = [
  "state         : u8  @0",    # enum win_state
  "owner         : u8  @1",    # owning task handle; 0xFF = kernel (was @11)
  "x             : u16 @2",
  "y             : u16 @4",
  "width         : u16 @6",
  "height        : u16 @8",
  "title         : u16 @10",   # near pointer into the title pool (was inline char[12])
  "zorder        : u8  @12",   # 0=bottom .. 15=top (in-entry realization of the z-relation)
  "flags         : u8  @13",   # enum win_flags (was @1)
  "content_scale : u8  @14",   # 1=normal, 2=double (hi-res auto-scale) (was @24)
  "reserved      : bytes[1]@15",
]

# Event record. kernel.asm: event_queue = 32 entries * 3 bytes, head/tail indices.
[[struct]]
name = "event"
size = 3
count = 32                # single global queue; forward-scan delivery w/ tombstones
fields = [
  "type : u8  @0",   # enum event_type
  "data : u16 @1",   # meaning depends on type (e.g. KEY_PRESS: lo=ASCII, hi=scan/focus-stamp)
]

# File-handle table entry. kernel.asm: FILE_ENTRY_SIZE=32, FILE_MAX_HANDLES=16.
# NOTE: the in-source data-section comment says "bytes 12-31 reserved", but the
# CODE writes owner at byte 24 (lines ~12669/14369/15177/19049) and PORT-SPEC §5
# pins owner @24. The comment is drift; this struct encodes the CODE. See [discrepancies].
[[struct]]
name = "file_handle"
size = 32
count = 16
fields = [
  "status         : u8     @0",   # 0=free, 1=open
  "mount          : u8     @1",   # mount handle
  "start_cluster  : u16    @2",
  "size           : u32    @4",   # file size (di+4 lo, di+6 hi)
  "position       : u32    @8",   # current position
  "owner          : u8     @24",  # owning task; 0xFF = kernel; owner-based reaping mandatory
  "reserved_a     : bytes[12]@12",
  "reserved_b     : bytes[7] @25",
]

# FAT12 on-disk directory entry (standard FAT 8.3). Offsets confirmed in kernel
# read path: attr @0x0B (12528), start cluster @0x1A (12630), size @0x1C (12631/12632).
[[struct]]
name = "dirent"
size = 32
fields = [
  "name          : char[11]@0",    # 8.3, space-padded, no dot. 0xE5=deleted, 0x00=free, 0x0F attr=LFN
  "attr          : u8      @11",
  "reserved      : bytes[10]@12",  # NT res, ctime, adate, (FAT12: cluster-hi unused) ...
  "wtime         : u16     @22",
  "wdate         : u16     @24",
  "start_cluster : u16     @26",   # 0x1A
  "size          : u32     @28",   # 0x1C
]

# .BIN application container header (port-independent). PORT-SPEC §4. Multi-byte
# fields stay LE for disk interchange even on BE ports. The 3.1 ".UNO v2" break
# adds explicit abi_version + arch tag (CONTRACT-ARCH §11) — not yet shipped here.
[[struct]]
name = "bin_header"
size = 80                          # code entry at 0x50
fields = [
  "magic : bytes[4] @0",           # 0xEB ?? 'U' 'I' — first byte doubles as x86 JMP
  "name  : char[12] @4",           # 0x04: NUL-padded display name
  "icon  : bytes[64]@16",          # 0x10: 16x16 @ 2bpp packed chunky, row-major, leftmost px in 2 MSBs
]
# entry: code begins at offset 0x50 (= size); app_run far-calls seg:0x0050.


# =============================================================================
# CONSTANTS
# =============================================================================

# FAT12 geometry — the "FIVE places" (PORT-SPEC §5), unified to ONE block.
# Currently duplicated by hand in: kernel/kernel.asm (mount routine + data
# defaults), boot/boot.asm (BPB), boot/stage2.asm (KERNEL_SECTORS layout),
# tools/add_floppy_fs.py, tools/create_app_test.py. Phase 1 regenerates them all.
# Values are for the x86 1.44 MB floppy. The UnoDOS filesystem starts at sector
# 110 (OS area: 1 boot + 4 stage2 + 104 kernel + 1 spare); derived sectors are
# ABSOLUTE (include the +110 base).
[const.fat12]
bytes_per_sector   = 512
sectors_per_cluster = 1
reserved_sectors   = 1            # within the filesystem
num_fats           = 2
root_dir_entries   = 224
sectors_per_fat    = 9
fs_start_sector    = 110          # OS area size; FS base offset
# Derived (encoded for the byte-identical anchor; Phase 1 will also emit the formulas):
fat_start          = 111          # = fs_start + reserved
root_dir_start     = 129          # = fs_start + reserved + num_fats*sectors_per_fat
root_dir_sectors   = 14           # = root_dir_entries*32 / bytes_per_sector
data_area_start    = 143          # = root_dir_start + root_dir_sectors
fat_cache_pair     = true         # cache holds sectors [S, S+1]: a 12-bit entry can straddle 511->S+1

# Font metrics. kernel.asm font_table: FONT_COUNT=3, FONT_DESC_SIZE=6 bytes/entry
# (ptr, height, width, advance, bpc). Default current_font=1. The font-advance
# bug is FIXED IN THE CONTRACT: default advance = 8 (not 12). See [discrepancies].
[const.font]
count   = 3
default = 1                        # 8x8 medium
[[const.font.table]]
index=0
name="font_4x6"
width=4
height=6
advance=6
bpc=6
role="small"
[[const.font.table]]
index=1
name="font_8x8"
width=8
height=8
advance=8
bpc=8
role="medium/default"
[[const.font.table]]
index=2
name="font_8x12"
width=8
height=12
advance=12
bpc=12
role="large"

# Default UI palette (indices 0-3). PORT-SPEC §1. Two representations both ship:
# 24-bit RGB (the canonical themed colors) and the x86 6-bit VGA DAC triples
# (kernel theme_palette default, "Classic VGA"). Ports match the rgb24 values.
[const.palette]
rgb24      = [0x0000AA, 0x00AAAA, 0xAA00AA, 0xFFFFFF]   # blue desktop, cyan, magenta, white
vga6bit    = [[0,0,42], [0,42,42], [42,0,42], [63,63,63]]
roles      = ["desktop/bg", "accent1", "accent2", "fg/white"]

# Screen + desktop metrics (x86 default mode). kernel.asm defaults.
[const.screen]
default_mode   = 0x04              # CGA mode 4
width          = 320
height         = 200
titlebar_height = 10               # 10 lo-res, 18 hi-res (dynamic)
desktop_reserved_rows = 12         # y 0-11 is the menu/title row (drag clamp)
icon_column_pitch = 80
cursor          = { w = 8, h = 14, kind = "arrow" }


# =============================================================================
# ENUMS
# =============================================================================

[enum.event_type]
NONE        = 0
KEY_PRESS   = 1
KEY_RELEASE = 2          # reserved (future)
TIMER       = 3          # reserved (future)
MOUSE       = 4          # data low = button mask
WIN_MOVED   = 5
WIN_REDRAW  = 6          # data low = window handle
CONSUMED    = 0xFF       # tombstone: slot consumed mid-queue

[enum.win_state]
FREE    = 0
VISIBLE = 1
HIDDEN  = 2

[enum.win_flags]            # bitmask
TITLE   = 0x01
BORDER  = 0x02
# bit2 (0x04) = FRAMELESS_FULLSCREEN per PORT-SPEC §2; kernel implements the
# frameless path but has no named equate yet. Encoded as the contract bit.
FRAMELESS_FULLSCREEN = 0x04

# Filesystem error codes (returned in AX on CF=1). API_REFERENCE.
[enum.fs_errno]
OK            = 0
NOT_FOUND     = 1
NO_DRIVER     = 2
READ_ERROR    = 3
INVALID_HANDLE = 4
NO_HANDLES    = 5
END_OF_DIR    = 6
WRITE_ERROR   = 7
DISK_FULL     = 8
DIR_FULL      = 9


# =============================================================================
# PROFILES & CAPABILITIES (CONTRACT-ARCH §9).  x86 reference declares `windowed`.
# Encoded minimally in Phase 0; the §9 matrix is filled across §13 in later phases.
# =============================================================================
[profile.windowed]
requires = ["wm", "mouse_or_dirnav", "fs"]
[profile.single_app]
requires = ["fs?"]
one_app  = true
[profile.minimal]
requires = []
one_app  = true
no_fs_ok = true
dirnav   = true

[port.x86]
profile      = "windowed"
capabilities = ["POINTER", "RTC"]   # PC speaker audio; no SMP/PREEMPT/NET in the shipping kernel


# =============================================================================
# DISCREPANCY LEDGER — the contradictions this contract resolves (the whole point).
# CONTRACT-ARCH §1. Each is now single-sourced above; Phase 1 proves byte-identical.
# =============================================================================
[discrepancies]
syscall_count = "PORT-SPEC §4 / ARCHITECTURE say '105 functions'; kernel_api_table is 106 slots (ordinals 0..105 inclusive). Resolved: callgate.count = 106 = len(syscall). The '105' was an off-by-one (last ordinal vs count)."
font_advance  = "ARCHITECTURE.md ('12 px') AND API_REFERENCE.md (API 48 font table: font 1 8x8 advance=12px) both carry the bug; PORT-SPEC §1 and the kernel (draw_font_advance db 8, font_table font 1 = advance 8) are correct. Resolved: const.font default(1).advance = 8 (source wins). Two docs drifted, not one."
handle_owner  = "kernel.asm file_table data-section comment says 'bytes 12-31 reserved'; the code writes/reads owner at byte 24 and PORT-SPEC §5 pins owner @24. Resolved: struct file_handle.owner @24; the comment is stale drift."
fat12_geometry = "FAT12 geometry was hand-duplicated in 5 places (kernel mount routine, kernel data defaults, boot/boot.asm BPB, boot/stage2.asm layout, tools/add_floppy_fs.py + tools/create_app_test.py). Resolved: const.fat12 is the single block; Phase 1 regenerates all consumers."


# =============================================================================
# WORLDS — per-port ABI variants. The ports diverge from x86 (CONTRACT-ARCH §13):
# constrained machines use a COMPACT 16-byte window entry, fewer windows, and
# their own symbol names. Phase 4 brings the Amiga's hand-maintained window-entry
# + UI-metrics block under the Contract so it can no longer drift; unogen emits
# unodef/gen/amiga/sysabi_gen.i and amiga/sysabi.i includes it. (This is the
# "describe what ships" multi-world model — byte-identical to the current port.)
# =============================================================================
[world.amiga]
description = "Amiga 68000 bare-metal; vasm; compact 16B window entry, 6 windows"
cpu = "m68k"
emit = "amiga/sysabi_gen.i"
note = "window entry is 16B here (PORT-SPEC base is 32B); symbol names are the port's own"

[[world.amiga.equate]]
sym = "WSTATE"
val = 0
note = "win_entry: state"
[[world.amiga.equate]]
sym = "WPROC"
val = 1
note = "win_entry: owner proc"
[[world.amiga.equate]]
sym = "WX"
val = 2
[[world.amiga.equate]]
sym = "WY"
val = 4
[[world.amiga.equate]]
sym = "WW"
val = 6
[[world.amiga.equate]]
sym = "WH"
val = 8
[[world.amiga.equate]]
sym = "WTITLE"
val = 10
note = "win_entry: title field"
[[world.amiga.equate]]
sym = "WENT_SIZE"
val = 16
note = "compact entry size (x86 base = 32)"
[[world.amiga.equate]]
sym = "MAXWIN"
val = 6
note = "window table size (x86 base = 16)"
[[world.amiga.equate]]
sym = "TBAR_H"
val = 10
note = "titlebar height (shared with base)"
[[world.amiga.equate]]
sym = "SCRW"
val = 320
[[world.amiga.equate]]
sym = "SCRH"
val = 200


# =============================================================================
# CAPABILITIES, PROFILES & MULTI-SURFACE DISPLAY (CONTRACT-ARCH §8/§9, Phase 8).
# A port declares one profile + a set of capabilities + its display surfaces;
# unogen emits the manifest of what the port must provide, making "this machine
# can't window" generated and honest. (Profiles defined above: windowed/single_app/
# minimal.) Capabilities cut across profiles.
# =============================================================================
[capability]
all = ["SMP","PREEMPT","OFFLOAD","NET","RTC","HEADLESS","TOUCH","POINTER","STEREO","DIRNAV"]

[[port.x86.surface]]
id = "primary"
w = 320
h = 200
depth = 2
role = "PRIMARY"

# Scale-down example: a 2 KB NES is `minimal` — one app, no WM, directional input.
[port.nes]
profile = "minimal"
capabilities = ["DIRNAV"]
ram_bytes = 2048
[[port.nes.surface]]
id = "primary"
w = 256
h = 240
depth = 2
role = "PRIMARY"

[port.gb]
profile = "minimal"
capabilities = ["DIRNAV"]
ram_bytes = 8192
[[port.gb.surface]]
id = "primary"
w = 160
h = 144
depth = 2
role = "PRIMARY"

[port.gg]
profile = "minimal"
capabilities = ["DIRNAV"]
ram_bytes = 8192
[[port.gg.surface]]
id = "primary"
w = 160
h = 144
depth = 4
role = "PRIMARY"

[port.gba]
profile = "minimal"
capabilities = ["DIRNAV"]
ram_bytes = 262144
[[port.gba.surface]]
id = "primary"
w = 240
h = 160
depth = 16
role = "PRIMARY"

[port.pce]
profile = "minimal"
capabilities = ["DIRNAV"]
ram_bytes = 8192
[[port.pce.surface]]
id = "primary"
w = 256
h = 224
depth = 4
role = "PRIMARY"

[port.vic20]
profile = "minimal"
capabilities = ["DIRNAV"]
ram_bytes = 8192
[[port.vic20.surface]]
id = "primary"
w = 176
h = 184
depth = 4
role = "PRIMARY"

# Bandai WonderSwan — the FIRST x86 (NEC V30MZ / 80186) handheld world. The V30MZ
# is the same instruction family as the kernel's reference x86, so the Contract's
# x86 surface (gen/x86/) is the genuine overlap; only the geometry equates are the
# port's own. MINIMAL (CONTRACT-ARCH §9): one full-screen app, directional nav via
# the d-pad. 16 KB internal RAM holds tile patterns + the 32x32 tilemap; the LCD is
# 224x144 mono (16 greys), so the visible window is the top-left 28x18 tiles.
[port.ws]
profile = "minimal"
capabilities = ["DIRNAV"]
ram_bytes = 16384
[[port.ws.surface]]
id = "primary"
w = 224
h = 144
depth = 4
role = "PRIMARY"

# Dual-screen example: DS is `windowed` with two surfaces + touch.
[port.ds]
profile = "windowed"
capabilities = ["TOUCH","SMP"]
[[port.ds.surface]]
id = "top"
w = 256
h = 192
role = "PRIMARY"
[[port.ds.surface]]
id = "bottom"
w = 256
h = 192
role = "SECONDARY"

# Stereo example: Virtual Boy is `single_app` with two eye views (red mono).
[port.virtualboy]
profile = "single_app"
capabilities = ["STEREO","DIRNAV"]
[[port.virtualboy.surface]]
id = "left"
w = 384
h = 224
role = "STEREO_L"
[[port.virtualboy.surface]]
id = "right"
w = 384
h = 224
role = "STEREO_R"

# Server example: a Dreamcast HEADLESS build — zero display surfaces.
[port.dc_server]
profile = "single_app"
capabilities = ["HEADLESS","NET","SMP"]

# The 6502 ports are `single_app` by design (CONTRACT-ARCH §9): one disk-loaded
# app resident at a time, no multi-window manager and no event queue (keyboard is
# polled synchronously) — which is WHY they carry no window-entry struct / EV_*
# constants for a [world.*] to source. Declaring the profile makes that honest and
# generated (the profile manifest + conformance assert "no WM required"), instead
# of faking a windowed ABI they don't ship. They DO have a filesystem (the USV1
# mini-FS, not FAT12) and a colour/mono framebuffer surface.
[port.c64]
profile = "single_app"
capabilities = ["RTC","DIRNAV"]   # CIA TOD clock; keyboard directional nav (no mouse)
[[port.c64.surface]]
id = "primary"
w = 320
h = 200
depth = 2
role = "PRIMARY"

[port.apple2]
profile = "single_app"
capabilities = ["DIRNAV"]         # keyboard nav; soft clock (no RTC hardware), no mouse at M1
[[port.apple2.surface]]
id = "primary"
w = 280
h = 192
depth = 1
role = "PRIMARY"

# Sega Master System — the FIRST port built fresh on the contract-driven +
# greenfield-window architecture (CONTRACT-ARCH §13). True Z80, so it consumes the
# existing gen/z80/ world (sjasmplus) directly. A resident OS image with a windowed
# tile desktop (like its tile-VDP cousins Genesis/SNES, hence single_app rather than
# the §9 default `minimal` for an 8 KB machine — "describe what ships"). The standard
# control pad has no mouse, so input is a d-pad-driven cursor (DIRNAV); the VDP gives
# a 16-colour 256x192 Mode-4 surface.
[port.sms]
profile = "single_app"
capabilities = ["DIRNAV"]
ram_bytes = 8192
[[port.sms.surface]]
id = "primary"
w = 256
h = 192
depth = 4
role = "PRIMARY"

# Raspberry Pi — FIRST AArch64 (64-bit) world. Firmware mailbox framebuffer, flat
# 640x480 32bpp. MINIMAL: one full-screen app, directional nav (AUTOTEST-driven).
[port.rpi]
profile = "minimal"
capabilities = ["DIRNAV"]
ram_bytes = 1048576
[[port.rpi.surface]]
id = "primary"
w = 640
h = 480
depth = 32
role = "PRIMARY"

# PinePhone — AArch64 (Allwinner A64), portrait 480x640 32bpp framebuffer.
[port.pinephone]
profile = "minimal"
capabilities = ["DIRNAV"]
ram_bytes = 1048576
[[port.pinephone.surface]]
id = "primary"
w = 480
h = 640
depth = 32
role = "PRIMARY"

# PowerPC Mac — FIRST PowerPC world. Open Firmware boot, OF linear framebuffer.
[port.ppcmac]
profile = "minimal"
capabilities = ["DIRNAV"]
ram_bytes = 1048576
[[port.ppcmac.surface]]
id = "primary"
w = 640
h = 480
depth = 32
role = "PRIMARY"


# =============================================================================
# UnoDOS 3.1 ABI (CONTRACT-ARCH §11, Phase 12) — the versioned clean break.
# ADDITIVE: the current flat ordinals (0..105) still ship; this defines the 3.1
# CATEGORIZED ordinal scheme + the .UNO v2 container. Re-issue is port-by-port
# with a dual-build window — no shipped port changes here. (font fix already in
# const.font; every multi-byte field stays little-endian.)
# =============================================================================
[abi31]
band_width = 32                # each category gets a 32-ordinal band (>= max count)
# §11 order; net/device are reserved for Phase 13.
category_order = ["gfx","text","window","event","fs","sched","ui","audio","system","net","device"]

# .UNO container v2 — explicit abi_version + arch tag (loader rejects mismatched
# binaries) + declared profile/caps; the "first byte = x86 JMP" trick is demoted.
[[struct]]
name = "uno_header_v2"
size = 96
fields = [
  "magic     : bytes[4] @0",    # 'U' 'N' 'O' '2'
  "abi_major : u8       @4",
  "abi_minor : u8       @5",
  "arch      : u8       @6",    # arch tag: 0=x86 1=m68k 2=6502 3=65816 4=z80 5=arm 6=ppc 7=sh 8=mips ...
  "profile   : u8       @7",    # 0=windowed 1=single_app 2=minimal
  "caps      : u32      @8",    # capability bitmask (LE)
  "name      : char[16] @12",
  "reserved  : bytes[4] @28",
  "icon      : bytes[64]@32",   # 16x16 @ 2bpp, as in v1
]
# code entry at offset 96 (= size).


# Boot/OS-area layout (x86 floppy): the composition that sums to fs_start_sector.
# Single-sources the "110" shared by boot/boot.asm (BPB reserved), boot/stage2.asm
# (KERNEL_SECTORS), and tools/add_floppy_fs.py — the last of the FAT12 "five places".
[const.boot_layout]
boot_sectors   = 1
stage2_sectors = 4
kernel_sectors = 104
spare_sectors  = 1     # boot + stage2 + kernel + spare == fat12.fs_start_sector (110)


