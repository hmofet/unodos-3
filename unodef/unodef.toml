# =============================================================================
# UNODEF — the UnoDOS Contract (Layer 0).  See ./README.md and docs/CONTRACT-ARCH.md.
#
# Phase 0: encodes WHAT ALREADY SHIPS on x86 (kernel/kernel.asm), no behavior
# change. Source of truth, in priority order:
#   kernel/kernel.asm  >  docs/PORT-SPEC.md  >  docs/API_REFERENCE.md
# "Where this file and the x86 source disagree, the source wins" (PORT-SPEC §1) —
# until Phase 1, when x86 is generated FROM this file and the rule inverts.
# =============================================================================

[contract]
name      = "UnoDOS"
# The name stays "UnoDOS 3" (uno·dos·tres). abi_target is the versioned 3.1 break.
abi_target = { major = 3, minor = 1 }
# What x86 ships TODAY (kernel_api_table header: magic 'KA', version 1.0):
abi_current = { api_magic = 0x4B41, api_version = 0x0001, slots = 106 }
endian    = "le"          # all multi-byte on-disk/in-mem fields; BE ports accessor-wrap at the boundary
source    = { kernel = "kernel/kernel.asm", spec = "docs/PORT-SPEC.md", api = "docs/API_REFERENCE.md" }


# =============================================================================
# CALL GATE  (L3/L2 boundary).  Shape is per-world; numbering+semantics live here.
# =============================================================================
[callgate]
count = 106               # the "105 vs 106" contradiction, resolved: 106 slots, ordinals 0..105.
                          # PORT-SPEC/ARCHITECTURE say "105 functions"; the table is 106 (0..105
                          # inclusive). len(syscalls) is now the only count. See [discrepancies].

[callgate.binding.x86]
gate     = "INT 0x80"
selector = "AH"           # function number in AH
args     = ["AL", "BX", "CX", "DX", "SI", "DI", "DS:SI", "ES:DI"]
error    = "CF set, code in AX"
notes    = "INT 0x80 clears IF; app must STI after each call. Kernel saves caller DS/ES; string args read from caller's original DS:SI / ES:DI."

[callgate.binding.m68k]
gate     = "TRAP #0"
selector = "D0 high byte"   # (or D7 — fix at port time and document; PORT-SPEC §4)
args     = ["D1", "D2", "D3", "D4", "A0", "A1"]
error    = "CCR carry, code in D0"

# Draw-context auto-translation (API 31): when a draw context is active, the
# dispatcher translates BX/CX window-relative -> absolute for this ordinal set.
# (API_REFERENCE preamble; API 103 self-translates, NOT in this dispatcher set.)
[callgate.autotranslate]
ordinals = [0,1,2,3,4,5,6, 50,51,52, 56,57,58,59,60,61,62, 65,66,67,68,69,70,71, 80, 87]


# =============================================================================
# SYSCALLS  (the call gate, per call).  ordinal = current shipping flat number.
#   verified=true -> register signature transcribed + cross-checked. ALL 106 are
#   verified: ords 91-100/102/104 (which API_REFERENCE leaves "pending") came from
#   their kernel.asm handler-header comments (the authority). Phase 1 re-checks vs
#   the live dispatch. args/ret entries are "REG: meaning"; `err` = the CF=1 case.
# =============================================================================

