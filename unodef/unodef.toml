# AMD64: NOT a new design — it's the host/64-bit-C SoA realization with a bigger
# capacity. Same logical model, same C dialect; only the descriptor differs. (A
# full AMD64 OS port's NEW work is the L1 mechanism — long mode, 64-bit call ABI,
# paging, GOP framebuffer — not the window model. The only new window surface AMD64
# invites is an OPTIONAL SIMD-composite accel behind these same accessors.)
[wmodel.platform.amd64]
cpu         = "x86_64"
dialect     = "c"
word_bits   = 64
ptr_bits    = 64           # native 64-bit handle/pointer
coord_space = "pixels"
coord_max   = 7680         # 8K-class display -> u16 coords (a single display fits in u16)
capacity    = 256          # modern: hundreds of windows
layout      = "soa"        # contiguous columns -> SIMD-composite friendly

# =============================================================================
# ARCHITECTURE SURVEY (spec_only): 40 years of micros, ONE logical window model.
# Descriptor-only specs - codegen is the proven C/SoA path (see host/amd64), so
# we don't emit redundant near-identical headers; wmgen lists their derived
# layouts in gen/wm/ARCHITECTURES.txt. ENDIANNESS: in-memory access is native
# (the accessor is generated for the platform's order); the .UNO/on-disk format
# stays LE (contract.endian) and big-endian ports byte-swap at THAT boundary
# only - portable policy never sees endianness.
# =============================================================================
[wmodel.platform.arm]      # ARMv4-v7 (Newton, PDAs, GBA-class, early phones)
cpu = "arm"
dialect = "c"
word_bits = 32
ptr_bits = 32
endian = "le"
coord_space = "pixels"
coord_max = 7680
capacity = 64
layout = "soa"
spec_only = true

