# ld65: UnoDOS/IIGS kernel -> a flat binary loaded at $00:2000.
# fill=no so the image is exactly code+rodata (boot loads it block by block).
# Kernel state/BSS lives at absolute $1000.. (see VARS in kernel.s), not in
# a loaded segment, so it never bloats the image.
MEMORY {
    MAIN: start=$2000, size=$9000, type=ro, file=%O, fill=no;
}
SEGMENTS {
    CODE:   load=MAIN, type=ro, start=$2000;
    RODATA: load=MAIN, type=ro;
}
